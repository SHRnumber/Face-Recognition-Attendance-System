<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Attendance Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="right-panel">
  <div class="row">
    <!-- Header -->
    <div class="col-12">
      <h3 class="mb-3">📋 Attendance Dashboard</h3>
      <hr>
    </div>

    <!-- Quick Actions -->
    <div class="col-12">
      <div class="card p-3">
        <h5>Quick Actions</h5>
        <div class="d-flex flex-wrap gap-2">
          <a href="/add_student" class="btn btn-primary">➕ Add Student</a>
          <a href="/mark_attendance" class="btn btn-success">📸 Mark Attendance</a>
          <a href="/attendance_record" class="btn btn-info">📊 View Records</a>
        </div>
      </div>
    </div>

    <!-- Train Model -->
    <div class="col-12">
      <div class="card p-3">
        <div class="d-flex justify-content-between align-items-center">
          <h5>🤖 Train Model</h5>
          <button id="trainBtn" class="btn btn-warning">Train Now</button>
        </div>
        <div class="mt-2">
          <div class="progress" style="height:25px;">
            <div id="trainProgress" class="progress-bar" style="width:0%">0%</div>
          </div>
          <div id="trainMsg" class="small text-muted mt-1">Ready to train</div>
        </div>
      </div>
    </div>

    <!-- Attendance Chart -->
    <div class="col-12">
      <div class="card p-3">
        <h5>📈 Attendance Trend (Last 30 Days)</h5>
        <canvas id="attendanceChart"></canvas>
      </div>
    </div>

    <!-- Student Management -->
    <div class="col-12">
      <div class="card p-3">
        <h5>👥 Student Management</h5>
        <div id="studentList">
          <div class="text-muted small">Loading students...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
